name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Forçar deploy do Backend"
        required: false
        type: boolean
        default: false
      force_frontend:
        description: "Forçar deploy do Frontend"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Detecta quais apps mudaram
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # ============================================
  # Backend: Build & Push Docker Image
  # ============================================
  backend-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true'
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set OWNER lowercase
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-backend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Backend: Deploy
  # ============================================
  backend-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-build]
    environment: production
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true') &&
      needs.backend-build.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            docker compose pull backend
            docker compose up -d backend
            
            echo "Waiting for backend to stabilize..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Status}}' lotio_backend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "✓ Backend is running (attempt $i)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ Backend failed to start. Logs:"
                docker logs --tail=100 lotio_backend 2>&1 || true
                exit 1
              fi
              echo "  Status: $STATUS — waiting 5s... ($i/20)"
              sleep 5
            done

            # Extra wait for app to initialize
            sleep 10

            echo "Running database migrations..."
            docker compose exec -T backend npx prisma migrate deploy

            echo "Latest logs from backend:"
            docker logs --tail=50 lotio_backend

            echo "Removing dangling Docker images from previous deploys..."
            docker image prune -f
            
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -n 20

  # ============================================
  # Frontend: Build & Push Docker Image (Nuxt SSR)
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true'
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set OWNER lowercase
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          build-args: |
            NUXT_PUBLIC_API_BASE=${{ secrets.FRONTEND_API_URL }}
            NUXT_PUBLIC_SITE_URL=${{ secrets.FRONTEND_SITE_URL }}
            NUXT_PUBLIC_FB_APP_ID=${{ secrets.NUXT_PUBLIC_FB_APP_ID }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Frontend: Deploy (aguarda backend se ambos mudaram)
  # ============================================
  frontend-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build, backend-deploy]
    environment: production
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true') &&
      needs.frontend-build.result == 'success' &&
      (
        (needs.detect-changes.outputs.backend != 'true' && github.event.inputs.force_backend != 'true') ||
        needs.backend-deploy.result == 'success'
      )
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            docker compose pull frontend
            docker compose up -d frontend

            echo "Waiting for frontend to stabilize..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Status}}' lotio_frontend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "✓ Frontend is running (attempt $i)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ Frontend failed to start. Logs:"
                docker logs --tail=100 lotio_frontend 2>&1 || true
                exit 1
              fi
              echo "  Status: $STATUS — waiting 5s... ($i/20)"
              sleep 5
            done

            echo "Latest logs from frontend:"
            docker logs --tail=20 lotio_frontend

            echo "Removing dangling Docker images from previous deploys..."
            docker image prune -f

            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -n 20

            echo "✅ Frontend SSR container rodando em ${{ secrets.DEPLOY_PATH }}"

  # ============================================
  # Summary
  # ============================================
  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-deploy, frontend-deploy]
    if: always()
    steps:
      - name: Deploy Summary
        run: |
          echo "## Deploy Summary — Lotio" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Changed | Force | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.detect-changes.outputs.backend }} | ${{ github.event.inputs.force_backend || 'false' }} | ${{ needs.backend-deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.detect-changes.outputs.frontend }} | ${{ github.event.inputs.force_frontend || 'false' }} | ${{ needs.frontend-deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
