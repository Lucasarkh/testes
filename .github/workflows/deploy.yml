name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Forçar deploy do Backend"
        required: false
        type: boolean
        default: false
      force_frontend:
        description: "Forçar deploy do Frontend"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Detecta quais apps mudaram
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  # ============================================
  # Backend: Build & Push Docker Image
  # ============================================
  backend-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true'
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set OWNER lowercase
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-backend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lc }}/lotio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Backend: Deploy
  # ============================================
  backend-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-build]
    environment: production
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true') &&
      needs.backend-build.result == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            docker compose pull backend
            docker compose up -d backend
            
            echo "Waiting for backend to stabilize..."
            for i in $(seq 1 20); do
              STATUS=$(docker inspect --format='{{.State.Status}}' lotio_backend 2>/dev/null || echo "missing")
              if [ "$STATUS" = "running" ]; then
                echo "✓ Backend is running (attempt $i)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ Backend failed to start. Logs:"
                docker logs --tail=100 lotio_backend 2>&1 || true
                exit 1
              fi
              echo "  Status: $STATUS — waiting 5s... ($i/20)"
              sleep 5
            done

            # Extra wait for app to initialize
            sleep 10

            echo "Running database migrations..."
            docker compose exec -T backend npx prisma migrate deploy

            echo "Latest logs from backend:"
            docker logs --tail=50 lotio_backend
            
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -n 20

  # ============================================
  # Frontend: Build (Nuxt static generation)
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build + Generate (Nuxt static)
        working-directory: apps/frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ secrets.FRONTEND_API_URL }}
        run: |
          pnpm run build
          pnpm run generate

      - name: Pack static output
        run: tar -czf front.tar.gz -C apps/frontend/.output public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-static
          path: front.tar.gz
          retention-days: 3

  # ============================================
  # Frontend: Deploy (aguarda backend se ambos mudaram)
  # ============================================
  frontend-deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-build, backend-deploy]
    environment: production
    if: |
      always() &&
      (needs.detect-changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true') &&
      needs.frontend-build.result == 'success' &&
      (
        (needs.detect-changes.outputs.backend != 'true' && github.event.inputs.force_backend != 'true') ||
        needs.backend-deploy.result == 'success'
      )
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: front-static

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "front.tar.gz"
          target: "/tmp"

      - name: Publish (atomic swap)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.FRONT_DEPLOY_PATH }}"
            RELEASE="/tmp/front_release_$(date +%s)"
            NEW_DIR="${DEPLOY_PATH}_new"
            OLD_DIR="${DEPLOY_PATH}_old"

            # Extrair build em diretório temporário
            mkdir -p "$RELEASE"
            tar -xzf /tmp/front.tar.gz -C "$RELEASE"

            # Preparar novo diretório com permissões corretas
            sudo rm -rf "$NEW_DIR"
            sudo cp -r "$RELEASE/public" "$NEW_DIR"
            sudo chown -R www-data:www-data "$NEW_DIR"
            sudo find "$NEW_DIR" -type d -exec chmod 755 {} \;
            sudo find "$NEW_DIR" -type f -exec chmod 644 {} \;

            # Garantir que o diretório base existe na primeira vez
            sudo mkdir -p "$DEPLOY_PATH"

            # Swap atômico: move atual para _old, move novo para atual
            # mv dentro do mesmo filesystem é atômico (syscall rename)
            sudo mv "$DEPLOY_PATH" "$OLD_DIR"
            sudo mv "$NEW_DIR" "$DEPLOY_PATH"

            # Remover versão anterior
            sudo rm -rf "$OLD_DIR"

            # Cleanup
            rm -rf "$RELEASE"
            rm -f /tmp/front.tar.gz

            echo "✅ Frontend publicado em $DEPLOY_PATH"

  # ============================================
  # Summary
  # ============================================
  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, backend-deploy, frontend-deploy]
    if: always()
    steps:
      - name: Deploy Summary
        run: |
          echo "## Deploy Summary — Lotio" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Changed | Force | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.detect-changes.outputs.backend }} | ${{ github.event.inputs.force_backend || 'false' }} | ${{ needs.backend-deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.detect-changes.outputs.frontend }} | ${{ github.event.inputs.force_frontend || 'false' }} | ${{ needs.frontend-deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
